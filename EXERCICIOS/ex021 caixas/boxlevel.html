<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de caixa</title>
    <style>
        h1 {
            background-color: azure;
            height: 300px;
            width: 300px;
            border-style: solid;
            border-color: cadetblue;

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;

            outline-width: 5px;
            outline-style: dashed ;
            outline-color: cornsilk;


            margin: auto;
        } 

        a {
            border-width: 10px;
            border-style: solid;
            border-color: crimson;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos são exemplos de caixa box-level, mas os <a href="#">links são exempos de caixas inine-level</a>Vamos ver como tudo isso funciona</p>
</body>
</html>
